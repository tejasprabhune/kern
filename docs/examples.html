<main>
  <h1>Examples</h1>

  <section>
    <h2>Live editor</h2>
    <p>Type any Typst math expression. Output updates as you type.</p>

    <div class="editor-pane">
      <div class="editor-input">
        <div class="pane-label">input</div>
        <textarea
          id="editor-textarea"
          spellcheck="false"
          autocorrect="off"
          autocomplete="off"
          placeholder="Type Typst math here..."
        >x = frac(-b plus.minus sqrt(b^2 - 4 a c), 2 a)</textarea>
      </div>
      <div class="editor-output">
        <div class="pane-label">output</div>
        <div id="editor-output"></div>
      </div>
    </div>

    <div class="editor-toolbar">
      <label style="font-size:0.85rem;display:flex;align-items:center;gap:0.4rem;cursor:pointer;">
        <input type="checkbox" id="display-toggle"> display mode
      </label>
      <button class="btn" id="permalink-btn">permalink</button>
    </div>
  </section>

  <section>
    <h2>Gallery</h2>
    <p>Click any card to load it into the editor.</p>
    <div class="gallery" id="gallery"></div>
  </section>
</main>
