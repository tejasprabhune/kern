<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kern &middot; examples</title>
  <link rel="stylesheet" href="https://use.typekit.net/bsk0vur.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="kern/kern.css">
  <link rel="stylesheet" href="kern/kern-newcm.css">
</head>
<body>

  <header>
    <a class="wordmark" href="index.html">kern</a>
    <p class="tagline">Typst math, in the browser.</p>
    <nav>
      <a href="index.html">Overview</a>
      <a href="docs.html">Docs</a>
      <a href="examples.html" class="active">Examples</a>
      <a href="https://github.com/tejasprabhune/kern" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </header>

  <section>
    <h2>Live editor</h2>
    <p>Type any Typst math expression. Output updates as you type.</p>

    <div class="editor-wrap">
      <div class="editor-col">
        <div class="pane-label">input</div>
        <textarea
          id="editor-textarea"
          spellcheck="false"
          autocorrect="off"
          autocomplete="off"
          placeholder="Type Typst math here..."
        >L^"CLIP"(theta) = EE_t [min(r_t(theta) hat(A)_t, "clip"(r_t(theta), 1 - epsilon, 1 + epsilon) hat(A)_t)]</textarea>
      </div>
      <div class="editor-col">
        <div class="pane-label">output</div>
        <div id="editor-output"></div>
      </div>
    </div>

    <div class="editor-toolbar">
      <label>
        <input type="checkbox" id="display-toggle" checked> display mode
      </label>
      <button class="btn" id="permalink-btn">permalink</button>
    </div>
  </section>

  <section>
    <h2>Gallery</h2>
    <p>Click any card to load it into the editor.</p>
    <div class="gallery" id="gallery"></div>
  </section>

  <footer>
    <a href="https://github.com/tejasprabhune/kern" target="_blank" rel="noopener">GitHub</a>
    <a href="https://github.com/tejasprabhune/kern/blob/main/LICENSE" target="_blank" rel="noopener">MIT</a>
    <a href="https://www.npmjs.com/package/kern-typ" target="_blank" rel="noopener">npm</a>
  </footer>

<script type="module" src="site.js"></script>

</body>
</html>
